<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Info Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2330;
    --accent: #1877f2;
    --accent2: #00d4ff;
    --green: #00e676;
    --red: #ff4444;
    --text: #e8eaf0;
    --muted: #5a6070;
    --card: #13161e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(24,119,242,0.12), transparent),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px);
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 20px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #fff;
    font-family: 'Share Tech Mono', monospace;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  h1 {
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Input section */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .config-row {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"], input[type="password"], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .input-row {
    display: flex;
    gap: 12px;
  }

  .input-row input {
    flex: 1;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .btn:hover { background: #1565d8; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  /* Status */
  .status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(24,119,242,0.08);
    border: 1px solid rgba(24,119,242,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
    margin-top: 16px;
    animation: pulse 1.5s infinite;
  }

  .status-bar.show { display: flex; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,212,255,0.2);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  /* Error */
  .error-box {
    display: none;
    background: rgba(255,68,68,0.08);
    border: 1px solid rgba(255,68,68,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--red);
    font-size: 14px;
    margin-top: 16px;
  }

  .error-box.show { display: block; }

  /* Result */
  .result-section {
    display: none;
    animation: fadeUp 0.5s ease;
  }

  .result-section.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .badge {
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.3);
    color: var(--green);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .result-name {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    flex: 1;
  }

  .avatar-wrapper {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .avatar-wrapper img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* Profile link */
  .profile-link {
    display: block;
    background: rgba(24,119,242,0.08);
    border: 1px solid rgba(24,119,242,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
    text-decoration: none;
    margin-bottom: 16px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: border-color 0.2s;
  }

  .profile-link:hover { border-color: var(--accent2); }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  @media(max-width: 480px) { .info-grid { grid-template-columns: 1fr; } }

  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }

  .info-card:hover { border-color: #2a3040; }

  .info-card .ic-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .info-card .ic-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    word-break: break-all;
  }

  .ic-value.private { color: var(--muted); font-style: italic; }
  .ic-value.verified { color: var(--green); }
  .ic-value.followers { color: var(--accent2); }

  /* Full-width card */
  .info-card.wide {
    grid-column: 1 / -1;
  }

  /* Work section */
  .work-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
  }

  .work-section .ws-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .work-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .work-item:last-child { border-bottom: none; padding-bottom: 0; }

  .work-item .wi-employer {
    font-weight: 700;
    font-size: 14px;
  }

  .work-item .wi-detail {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  /* Copy button */
  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Advanced toggle */
  .toggle-link {
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    margin-top: 12px;
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.2s;
  }

  .toggle-link:hover { color: var(--accent2); }

  .advanced-config {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .advanced-config.open { display: block; }

  .hint {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">f</div>
      <span class="logo-text">INFO TOOL</span>
    </div>
    <h1>Facebook<br>Info Checker</h1>
    <p class="subtitle">// tra cứu thông tin tài khoản</p>
  </header>

  <div class="input-section">
    <div class="config-row">
      <label>📌 UID hoặc Link Facebook</label>
      <div class="input-row">
        <input type="text" id="fbInput" placeholder="100012345678 hoặc https://facebook.com/..." />
        <button class="btn" id="checkBtn" onclick="checkFB()">Tra cứu</button>
      </div>
      <p class="hint">Nhập UID số hoặc link profile Facebook</p>
    </div>

    <a class="toggle-link" onclick="toggleAdvanced()">⚙ Cấu hình API ›</a>

    <div class="advanced-config" id="advancedConfig">
      <div class="config-row">
        <label>🔑 Facebook Access Token</label>
        <input type="password" id="fbToken" placeholder="EAA..." />
        <p class="hint">Token Graph API để lấy thêm thông tin (không bắt buộc)</p>
      </div>

    </div>

    <div class="status-bar" id="statusBar">
      <div class="spinner"></div>
      <span id="statusText">Đang xử lý...</span>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="avatar-wrapper" id="avatarEl">👤</div>
      <div>
        <div class="result-name" id="resultName">—</div>
        <div class="badge" id="verifiedBadge" style="display:none">✓ Tích xanh</div>
      </div>
    </div>

    <a class="profile-link" id="profileLink" href="#" target="_blank">—</a>

    <div class="info-grid" id="infoGrid"></div>

    <div id="workSection"></div>
  </div>

</div>

<script>
function toggleAdvanced() {
  const el = document.getElementById('advancedConfig');
  el.classList.toggle('open');
}

function setStatus(msg) {
  const bar = document.getElementById('statusBar');
  document.getElementById('statusText').textContent = msg;
  bar.classList.add('show');
}

function hideStatus() {
  document.getElementById('statusBar').classList.remove('show');
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '❌ ' + msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

function safe(v) {
  if (v === null || v === undefined || v === '' || (Array.isArray(v) && !v.length) || (typeof v === 'object' && !Array.isArray(v) && !Object.keys(v).length))
    return null;
  return v;
}

function safeStr(v) { return safe(v) ?? 'Không công khai'; }

const PROXY = 'https://corsproxy.io/?url=';

async function proxyFetch(url) {
  // Thử thẳng trước, nếu CORS lỗi thì dùng proxy
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (r.ok) return r.json();
    throw new Error('not ok');
  } catch {
    const r2 = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(12000) });
    return r2.json();
  }
}

async function getFBId(input) {
  if (/^\d+$/.test(input.trim())) return input.trim();
  setStatus('🔍 Đang chuyển link sang UID...');
  try {
    const j = await proxyFetch(`https://ffb.vn/api/tool/get-id-fb?idfb=${encodeURIComponent(input)}`);
    return j.id || null;
  } catch { return null; }
}

async function fetchDungkon(uid, apiKey) {
  setStatus('📡 Đang lấy thông tin từ API...');
  try {
    return await proxyFetch(`https://dungkon.lol/facebook/getinfo?uid=${uid}&apikey=${apiKey}`);
  } catch { return {}; }
}

async function fetchGraph(uid, token) {
  if (!token) return {};
  setStatus('🔗 Đang lấy thông tin từ Graph API...');
  const fields = 'id,name,is_verified,created_time,birthday,gender,relationship_status,subscribers.limit(0).summary(true),hometown,location';
  try {
    const j = await proxyFetch(`https://graph.facebook.com/${uid}?fields=${fields}&access_token=${token}`);
    return j.id ? j : {};
  } catch { return {}; }
}

function renderInfo(label, value, icon, cls='') {
  const isPrivate = !safe(value);
  return `
    <div class="info-card">
      <div class="ic-label">${icon} ${label}</div>
      <div class="ic-value ${isPrivate ? 'private' : cls}">${isPrivate ? 'Không công khai' : value}</div>
    </div>`;
}

async function checkFB() {
  hideError();
  document.getElementById('resultSection').classList.remove('show');

  const input = document.getElementById('fbInput').value.trim();
  if (!input) { showError('Vui lòng nhập UID hoặc link Facebook!'); return; }

  const apiKey = 'dungkon_w99fq';
  const fbToken = document.getElementById('fbToken').value.trim();
  const btn = document.getElementById('checkBtn');
  btn.disabled = true;

  try {
    const uid = await getFBId(input);
    if (!uid) { showError('Không lấy được UID từ link này!'); return; }

    const [dungkon, graph] = await Promise.all([
      fetchDungkon(uid, apiKey),
      fetchGraph(uid, fbToken)
    ]);

    // Merge data
    const name     = dungkon.name     || graph.name;
    let   gender   = dungkon.gender   || graph.gender;
    let   birthday = dungkon.birthday || graph.birthday;
    const relation = dungkon.relationship_status || graph.relationship_status;
    const hometown = dungkon.hometown || graph.hometown?.name;
    const location = dungkon.location || graph.location?.name;
    const created  = graph.created_time || dungkon.created_time || dungkon.created || dungkon.created_at;
    const followers = graph.subscribers?.summary?.total_count || dungkon.follower;
    const verified  = graph.is_verified || dungkon.tichxanh;
    const username  = dungkon.username;
    const link      = dungkon.link_profile || (username ? `https://facebook.com/${username}` : `https://facebook.com/${uid}`);
    const about     = dungkon.about;
    const quotes    = dungkon.quotes;
    const love      = dungkon.love;
    const work      = dungkon.work;
    const avatar    = dungkon.avatar || dungkon.picture;

    // Gender translate
    const genderMap = { male: 'Nam', female: 'Nữ', other: 'Khác' };
    const genderVi = genderMap[String(gender).toLowerCase()] || null;

    // Birthday fix
    const bday = ['sinh nhật private','private','none'].includes(String(birthday).toLowerCase()) ? null : birthday;

    // Love
    let loveStr = null;
    if (love && typeof love === 'object') loveStr = `${love.name} (${love.id})`;
    else if (love) loveStr = love;

    // Render header
    document.getElementById('resultName').textContent = name || `UID: ${uid}`;
    if (verified) document.getElementById('verifiedBadge').style.display = 'inline-block';
    else document.getElementById('verifiedBadge').style.display = 'none';

    const av = document.getElementById('avatarEl');
    if (avatar) {
      av.innerHTML = `<img src="${avatar}" onerror="this.parentElement.innerHTML='👤'">`;
    } else av.innerHTML = '👤';

    const pl = document.getElementById('profileLink');
    pl.href = link;
    pl.textContent = link;

    // Grid
    let grid = '';
    grid += renderInfo('UID', uid, '🆔');
    grid += renderInfo('Username', username, '👤');
    grid += renderInfo('Giới tính', genderVi, '🚻');
    grid += renderInfo('Sinh nhật', bday, '🎂');
    grid += renderInfo('Mối quan hệ', relation, '💍');
    grid += renderInfo('Người yêu', loveStr, '❤️');
    grid += renderInfo('Quê quán', hometown, '🌍');
    grid += renderInfo('Nơi ở', location, '📍');
    grid += renderInfo('Người theo dõi', followers ? Number(followers).toLocaleString('vi') : null, '📡', 'followers');
    grid += renderInfo('Ngày tạo', created, '🕒');
    if (about) grid += `<div class="info-card wide"><div class="ic-label">📝 Giới thiệu</div><div class="ic-value">${about}</div></div>`;
    if (quotes) grid += `<div class="info-card wide"><div class="ic-label">💬 Tiểu sử</div><div class="ic-value">${quotes}</div></div>`;

    document.getElementById('infoGrid').innerHTML = grid;

    // Work
    let workHTML = '';
    if (Array.isArray(work) && work.length) {
      workHTML = `<div class="work-section">
        <div class="ws-title">💼 Công việc (${work.length})</div>`;
      work.forEach(w => {
        const emp = w.employer?.name || 'N/A';
        const pos = w.position?.name || '';
        const loc = w.location?.name || '';
        const start = w.start_date || '';
        workHTML += `<div class="work-item">
          <div class="wi-employer">${emp}</div>
          <div class="wi-detail">${[pos, loc, start].filter(Boolean).join(' · ')}</div>
        </div>`;
      });
      workHTML += '</div>';
    }
    document.getElementById('workSection').innerHTML = workHTML;

    hideStatus();
    document.getElementById('resultSection').classList.add('show');

  } catch(e) {
    hideStatus();
    showError('Lỗi: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

// Enter key
document.getElementById('fbInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkFB();
});
</script>
</body>
</html>
