<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Info Lookup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --card: #0f1628;
    --border: #1a3a6b;
    --accent: #1877f2;
    --accent2: #42b883;
    --text: #c8d8f0;
    --label: #4a7fc1;
    --red: #e74c3c;
    --yellow: #f1c40f;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Exo 2', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(24,119,242,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(66,184,131,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
  }

  header h1 span { color: var(--accent); }

  header p {
    font-size: 0.8rem;
    color: var(--label);
    margin-top: 6px;
    font-family: var(--mono);
    letter-spacing: 1px;
  }

  .search-box {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 520px;
    margin-bottom: 28px;
  }

  input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: #fff;
    font-family: var(--mono);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: #2a4a7f; }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 1px;
  }

  button:hover { background: #1565d8; }
  button:active { transform: scale(0.97); }
  button:disabled { background: #1a3a6b; cursor: not-allowed; }

  .card {
    width: 100%;
    max-width: 520px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: none;
  }

  .card.show { display: block; }

  .card-header {
    background: linear-gradient(135deg, #0d1f42, #0f2d5e);
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    object-fit: cover;
    background: #1a3a6b;
    flex-shrink: 0;
  }

  .name-block h2 {
    font-size: 1.2rem;
    font-weight: 800;
    color: #fff;
  }

  .name-block a {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
  }

  .verified {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 6px;
    font-weight: 700;
    vertical-align: middle;
  }

  .rows { padding: 16px; display: flex; flex-direction: column; gap: 8px; }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    background: rgba(24,119,242,0.04);
    border: 1px solid rgba(26,58,107,0.5);
    font-size: 0.88rem;
  }

  .row .lbl {
    font-family: var(--mono);
    color: var(--label);
    font-size: 0.75rem;
    min-width: 120px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .row .val {
    color: var(--text);
    word-break: break-word;
  }

  .val.empty { color: #2a4a7f; font-style: italic; }
  .val.green { color: var(--accent2); }
  .val.yellow { color: var(--yellow); }
  .val.red { color: var(--red); }

  .section-title {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 16px;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  .loading {
    text-align: center;
    padding: 30px;
    font-family: var(--mono);
    color: var(--label);
    font-size: 0.85rem;
    display: none;
  }

  .loading.show { display: block; }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--red);
    font-family: var(--mono);
    font-size: 0.82rem;
    width: 100%;
    max-width: 520px;
    display: none;
  }

  .error.show { display: block; }

  footer {
    margin-top: 40px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: #1a3a6b;
  }
</style>
</head>
<body>

<header>
  <h1><span>FB</span> INFO LOOKUP</h1>
  <p>// tra cứu thông tin facebook theo uid</p>
</header>

<div class="search-box">
  <input id="uid" type="text" placeholder="Nhập UID Facebook..." />
  <button id="btn" onclick="lookup()">TRA CỨU</button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  Đang lấy dữ liệu...
</div>

<div class="error" id="error"></div>

<div class="card" id="card">
  <div class="card-header">
    <img class="avatar" id="av" src="" alt="avatar" onerror="this.style.display='none'">
    <div class="name-block">
      <h2 id="c-name">—</h2>
      <a id="c-link" href="#" target="_blank">—</a>
    </div>
  </div>

  <div class="rows" id="rows"></div>
</div>

<footer>powered by dungkon api</footer>

<script>
const API_URL = "https://dungkon.lol/facebook/getinfo";
const API_KEY = "dungkon_w99fq";

function empty(v) {
  return v === null || v === undefined || v === "" || (Array.isArray(v) && v.length === 0);
}

function val(v, cls) {
  if (empty(v)) return `<span class="val empty">Không có dữ liệu</span>`;
  return `<span class="val ${cls||''}">${v}</span>`;
}

function row(label, value, cls) {
  return `<div class="row"><span class="lbl">${label}</span>${val(value, cls)}</div>`;
}

function formatWork(work) {
  if (!Array.isArray(work) || work.length === 0) return val(null);
  return work.map((w, i) => {
    const emp = w.employer?.name || "N/A";
    const pos = w.position?.name || "N/A";
    const loc = w.location?.name || "N/A";
    const start = w.start_date || "N/A";
    return `<span class="val">${i+1}. <b>${emp}</b> | ${pos} | ${loc} | ${start}</span>`;
  }).join("<br>");
}

async function lookup() {
  const uid = document.getElementById("uid").value.trim();
  if (!uid) return;

  const btn = document.getElementById("btn");
  const loading = document.getElementById("loading");
  const card = document.getElementById("card");
  const error = document.getElementById("error");

  btn.disabled = true;
  loading.classList.add("show");
  card.classList.remove("show");
  error.classList.remove("show");

  try {
    const res = await fetch(`${API_URL}?uid=${encodeURIComponent(uid)}&apikey=${API_KEY}`, {
      headers: { "Accept": "application/json" }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();

    // Header
    document.getElementById("av").src = d.avatar || "";
    document.getElementById("c-name").innerHTML =
      (d.name || "Không rõ") + (d.tichxanh ? '<span class="verified">✓ Tích xanh</span>' : "");
    const link = document.getElementById("c-link");
    link.textContent = d.link_profile || d.username || d.uid || "—";
    link.href = d.link_profile || "#";

    // Rows
    const love = typeof d.love === "object" && d.love
      ? `${d.love.name} (${d.love.id})`
      : d.love;

    document.getElementById("rows").innerHTML = `
      <div class="section-title">// thông tin cơ bản</div>
      ${row("UID", d.uid, "green")}
      ${row("Username", d.username, "yellow")}
      ${row("Giới tính", d.gender)}
      ${row("Sinh nhật", d.birthday)}
      ${row("Theo dõi", d.follower ? Number(d.follower).toLocaleString() : null, "green")}
      <div class="section-title">// địa chỉ & quan hệ</div>
      ${row("Quê quán", d.hometown)}
      ${row("Nơi ở", d.location)}
      ${row("Quan hệ", d.relationship_status)}
      ${row("Người yêu/Vợ chồng", love)}
      <div class="section-title">// công việc</div>
      <div class="row"><span class="lbl">Công việc</span><div>${formatWork(d.work)}</div></div>
      <div class="section-title">// giới thiệu</div>
      ${row("About", d.about)}
      ${row("Quotes", d.quotes)}
    `;

    card.classList.add("show");
  } catch(e) {
    error.textContent = "Lỗi: " + e.message;
    error.classList.add("show");
  } finally {
    btn.disabled = false;
    loading.classList.remove("show");
  }
}

document.getElementById("uid").addEventListener("keydown", e => {
  if (e.key === "Enter") lookup();
});
</script>
</body>
</html>
